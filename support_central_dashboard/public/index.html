<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Customer Support Central Dashboard — Manage text support requests">
  <title>Support Central — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ========== HEADER ========== -->
  <header id="app-header">
    <div class="header-left">
      <span class="material-icons-round header-icon">headset_mic</span>
      <h1>Support Central</h1>
    </div>
    <div class="header-right">
      <div id="connection-status" class="status-badge disconnected">
        <span class="status-dot"></span>
        <span class="status-text">Offline</span>
      </div>
    </div>
  </header>

  <!-- ========== MAIN LAYOUT ========== -->
  <main id="app-main">
    <!-- LEFT: Request List -->
    <aside id="requests-panel">
      <div class="panel-header">
        <h2>Support Requests</h2>
        <span id="request-count" class="badge">0</span>
      </div>
      <div id="requests-list" class="scrollable">
        <div id="no-requests" class="empty-state">
          <span class="material-icons-round">inbox</span>
          <p>No support requests yet</p>
          <span class="sub-text">Requests from remote sites will appear here</span>
        </div>
      </div>
    </aside>

    <!-- CENTER: Chat / Details -->
    <section id="detail-panel">
      <div id="detail-empty" class="empty-state">
        <span class="material-icons-round">forum</span>
        <p>Select a request</p>
        <span class="sub-text">Choose a support request from the left panel to view details and chat</span>
      </div>

      <div id="detail-content" class="hidden">
        <div id="detail-header">
          <div class="detail-info">
            <h3 id="detail-site-name">Site Name</h3>
            <span id="detail-type-badge" class="type-badge">TEXT</span>
            <span id="detail-time" class="detail-time"></span>
          </div>
          <div class="detail-actions">
            <button id="btn-resolve" class="btn btn-success" title="Mark as resolved">
              <span class="material-icons-round">check_circle</span>
              Resolve
            </button>
          </div>
        </div>

        <div id="chat-messages" class="scrollable"></div>

        <div id="chat-input-area">
          <input type="text" id="chat-input" placeholder="Type your reply…" autocomplete="off">
          <button id="btn-send" class="btn btn-primary">
            <span class="material-icons-round">send</span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- ========== NOTIFICATION TOAST ========== -->
  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/jssip@3.10.0/dist/jssip.min.js"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
